name: "Build Check"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: "ubuntu-22.04"

    env:
      NODE_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Check typescript types & lint
        run: bun run lint

      - name: Build @selection-qx/web
        run: cd apps/web && bun run build
